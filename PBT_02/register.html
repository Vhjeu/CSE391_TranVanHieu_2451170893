<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Trần văn Hiếu 66KTPM1</title>
</head>
<body>

    <h1>Đăng ký tài khoản E-Commerce</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Thông tin cá nhân</legend>

            <label for="fullname">Họ tên:</label>
            <input type="text" id="fullname" name="fullname" 
                   required minlength="2" maxlength="50" 
                   placeholder="ho ten">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" 
                   required placeholder="hieu@gmail.com">
            <br><br>

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" 
                   pattern="[0-9]{10}" title="Vui lòng nhập đúng 10 chữ số" 
                   placeholder="0912345678">
            <br><br>

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" 
                   max="2026-04-24" placeholder="Chọn ngày sinh">
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" 
                   pattern="^[a-zA-Z0-9_]{3,20}$" 
                   title="3-20 ký tự, chỉ gồm chữ cái, số và dấu gạch dưới"
                   placeholder="hieu_66ktpm">
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" 
                   required minlength="8" 
                   pattern="(?=.*\d)(?=.*[A-Z]).{8,}" 
                   title="Tối thiểu 8 ký tự, ít nhất 1 chữ hoa và 1 số"
                   placeholder="Nhập mật khẩu">
            <br><br>

            <label for="confirm_password">Xác nhận password:</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   required minlength="8" 
                   pattern="(?=.*\d)(?=.*[A-Z]).{8,}"
                   placeholder="Nhập lại mật khẩu">
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city" required>
                <option value="">-- Chọn Thành phố --</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
                <option value="haiphong">Hải Phòng</option>
                <option value="cantho">Cần Thơ</option>
            </select>
            <br><br>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="">-- Chọn Quận/Huyện --</option>
                <option value="dongda">Đống Đa</option>
                <option value="caugiay">Cầu Giấy</option>
            </select>
            <br><br>

            <label for="address">Địa chỉ chi tiết:</label><br>
            <textarea id="address" name="address" rows="3" 
                      placeholder="Số nhà, tên đường..."></textarea>
            <br><br>

            <label>Giới tính:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Nam</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Nữ</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label>
        </fieldset>

        <br>
        <label>
            <input type="checkbox" name="terms" required>
            Tôi đồng ý với <a href="#">điều khoản sử dụng</a>
        </label>
        <br><br>

        <button type="submit">Đăng ký</button>
        <button type="reset">Xóa form</button>

    </form>
</body>
</html>
