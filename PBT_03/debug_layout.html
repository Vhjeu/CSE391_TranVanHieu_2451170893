<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug CSS Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h2>Cách 1: Sửa bằng border-box</h2>
    <div class="container clearfix">
        <div class="sidebar fix-border-box">Sidebar (border-box)</div>
        <div class="content fix-border-box">Content (border-box)</div>
    </div>

    <h2>Cách 2: Sửa bằng cách tính lại Width (không dùng border-box)</h2>
    <div class="container clearfix">
        <div class="sidebar fix-math">Sidebar (Tính toán tay)</div>
        <div class="content fix-math">Content (Tính toán tay)</div>
    </div>

</body>
</html>
